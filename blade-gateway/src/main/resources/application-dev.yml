blade:
  #多团队协作服务配置
  loadbalancer:
    #开启配置
    enabled: true
    #灰度版本
    #version: 3.0.0
    #负载均衡优先调用的ip段
    prior-ip-pattern:
      - 192.168.0.*
      - 127.0.0.1

# HTTP 服务端配置（Netty 底层）
server:
  netty:
    connection-timeout: 30s       # 连接超时
  # WebFlux 超时配置
  shutdown: graceful

# 网关 HTTP 客户端超时配置
spring:
  cloud:
    gateway:
      server:
        webflux:
          httpclient:
            response-timeout: PT3M
